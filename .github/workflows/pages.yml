name: pages

# Builds the real wheel and publishes the browser demo to
# https://egnaro9.github.io/rag-eval-lab/ — the page pip-installs that wheel
# into Pyodide, so the demo always runs the code currently on main.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Assemble the demo site
        run: |
          mkdir -p site
          cp demo/index.html demo/app.js site/
          cp dist/*.whl site/
          WHEEL=$(cd dist && ls *.whl | head -1)
          echo "window.WHEEL_URL = './${WHEEL}';" > site/wheel.js
          echo "Demo will install: ${WHEEL}"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
