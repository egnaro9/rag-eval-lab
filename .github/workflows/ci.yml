name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (stdlib-only core + pytest)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run the eval CLI (smoke) and prove the hallucination is flagged
        run: |
          python -m ragevallab.cli eval --out eval_run.json
          python - <<'PY'
          import json, sys
          run = json.load(open("eval_run.json"))
          flagged = [c for c in run["cases"] if c["flagged"]]
          assert len(flagged) == 1, f"expected 1 flagged case, got {len(flagged)}"
          assert "PLANTED" in flagged[0]["note"]
          print("OK: eval harness flagged the planted hallucination")
          PY

  # A Dockerfile nobody builds is a promise, not an artifact. This repo shipped
  # one for months with nothing checking it, which is the exact shape of problem
  # the rest of the repo exists to argue against — so it gets built, and the
  # image gets run, on every push.
  docker:
    name: the image actually builds and runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -t rag-eval-lab:ci .
      - name: Run the eval inside the image
        run: |
          docker run --rm rag-eval-lab:ci | tee /tmp/out.txt
          grep -q "PLANTED" /tmp/out.txt || {
            echo "::error::the image ran but didn't flag the planted hallucination"; exit 1; }
      - name: The test suite passes inside the image too
        run: docker run --rm rag-eval-lab:ci pytest -q

  # Every push to main gets its eval run stored, so the history is a record of
  # what this repo actually scored per commit rather than a demo dataset.
  #
  # Not part of `test`: recording is a side effect, and eval-history sleeping on
  # a free tier must never turn this repo's CI red. The eval is the product; the
  # bookkeeping is not allowed to fail the thing it books.
  record:
    name: record the run in eval-history
    needs: test
    # main only: fork PRs have no secrets, and a PR run would record a score
    # for code that never landed. workflow_dispatch is allowed so a run can be
    # re-recorded without inventing a commit to hang it on.
    if: >-
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run the eval
        run: python -m ragevallab.cli eval --out eval_run.json
      - name: POST it to eval-history
        env:
          EVAL_HISTORY_WRITE_KEY: ${{ secrets.EVAL_HISTORY_WRITE_KEY }}
        run: |
          python scripts/post_run.py \
            --url https://eval-history.onrender.com \
            --file eval_run.json \
            --git-sha "${GITHUB_SHA:0:7}" \
            --label "$(git log -1 --pretty=%s)"
      - name: What does it say changed?
        run: |
          curl -sS --max-time 90 \
            "https://eval-history.onrender.com/suites/rag-eval-lab/latest-comparison" \
            | python -m json.tool || echo "(need two runs before there's a comparison)"

  gate:
    name: prompt-regress — PR eval gate
    needs: test
    # PRs only, and pull-requests:write means same-repo PRs; fork PRs lack the
    # secret, and the action skips cleanly when the write key is empty.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Run the eval
        run: python -m ragevallab.cli eval --out eval_run.json
      # Dogfood: gate this repo's own evals against its main-branch baseline.
      - uses: egnaro9/prompt-regress@main
        with:
          run: eval_run.json
          suite: rag-eval-lab
          write-key: ${{ secrets.EVAL_HISTORY_WRITE_KEY }}
