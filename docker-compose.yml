# Run the RAG service (and, alongside it, a real pgvector Postgres).
#
#   docker compose up --build api        # service on :8000  (POST /query, /eval)
#   docker compose up -d db              # just the pgvector database, e.g. for
#                                        # DATABASE_URL=postgresql://rag:rag@localhost:5432/rag
#   docker compose run --rm eval         # run the offline eval once, print the report
#
# /query and /eval use the dependency-free in-memory pipeline, so the service
# needs no database; `db` is here for exercising the PgVectorStore path.
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    command: ["sh", "-c", "uvicorn ragevallab.api:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5

  eval:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
